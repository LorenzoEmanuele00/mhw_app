name: mhw_app
description: "Monster Hunter Wilds Character Builder"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local DB
  drift: ^2.33.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Internationalisation
  intl: any

  # Remote sync
  supabase_flutter: ^2.9.0

  # State management
  flutter_riverpod: ^3.1.0

  # Navigation
  go_router: ^17.2.3

  # Utilities
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.33.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/seeds/
